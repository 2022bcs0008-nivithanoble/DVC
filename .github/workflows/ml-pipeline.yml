name: ML Pipeline

on:
  push:
    branches:
        - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install "dvc[s3]"

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Pull dataset from DVC
      run: dvc pull

    - name: Train model
      run: python train.py

    - name: Upload metrics artifact
      uses: actions/upload-artifact@v4
      with:
        name: metrics
        path: outputs/metrics/

    - name: Write Results to GitHub Summary
      run: 

    - name: Write Results to GitHub Summary
      run: |
        DATASET_SIZE=$(python -c "import pandas as pd; df=pd.read_csv('data/data_partial.csv'); print(len(df))")

        MSE=$(python -c "import json,math; m=json.load(open('outputs/metrics/results.json')); print(math.sqrt(m['MSE']))")

        R2=$(python -c "import json; m=json.load(open('outputs/metrics/results.json')); print(m['R2'])")

        echo "## Result Version 1" >> $GITHUB_STEP_SUMMARY
        echo "**Roll No:** 2022BCS0008" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Dataset Size (Training Samples):** $DATASET_SIZE" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Training Metrics**" >> $GITHUB_STEP_SUMMARY
        echo "- MSE: $MSE" >> $GITHUB_STEP_SUMMARY
        echo "- R2: $R2" >> $GITHUB_STEP_SUMMARY

    - name: Compare metrics
      run: |
        echo "Comparing model metrics..."
        python compare_metrics.py

    - name: Log in to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Docker Image
      if: success()
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ml-model:latest .

    - name: Push Docker Image
      if: success()
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/ml-model:latest